<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma'ruza Tarjimon Pro</title>
  <style>
    :root {
      --bg-color: #121214;
      --panel-bg: #1a1a1e;
      --border-color: #2a2a30;
      --text-main: #e1e1e6;
      --text-muted: #a8a8b3;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; display: flex; flex-direction: column; height: 100vh; }
    header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
    .logo-area { display: flex; align-items: center; gap: 10px; }
    .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; background: var(--border-color); }
    .badge.on { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    .badge.err { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    .config-panel { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    input, select, button { background: var(--panel-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; border-radius: 6px; font-size: 14px; outline: none; }
    input:focus, select:focus { border-color: var(--primary); }
    button { cursor: pointer; font-weight: 600; transition: all 0.2s; }
    button:hover { background: var(--border-color); }
    .btn-primary { background: var(--warning); color: #000; border: none; }
    .btn-primary:hover { background: #d97706; }
    .btn-primary.recording { background: var(--danger); color: #fff; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    .workspace { display: flex; flex: 1; gap: 15px; overflow: hidden; min-height: 0; flex-direction: row; }
    @media (max-width: 768px) { .workspace { flex-direction: column; } }
    .pane { flex: 1; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
    .pane h2 { font-size: 16px; padding: 12px; border-bottom: 1px solid var(--border-color); background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; }
    .content-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .msg-box { padding: 10px 14px; border-radius: 8px; background: rgba(255,255,255,0.03); border-left: 3px solid var(--border-color); line-height: 1.5; font-size: 15px; position: relative; }
    .msg-box.pending { border-left-color: var(--warning); color: var(--text-muted); }
    .msg-box:not(.pending) { border-left-color: var(--success); }
    .msg-box .time { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; display: block; }
    .empty-hint { color: var(--text-muted); font-style: italic; text-align: center; margin-top: 20px; }
    .interim { color: var(--warning); font-style: italic; border-left: 3px dashed var(--warning); background: transparent; }
    .controls-bottom { margin-top: 15px; display: flex; justify-content: flex-end; gap: 10px; }
  </style>
</head>
<body>

  <header>
    <div class="logo-area">
      <h2>Ma'ruza-Tarjimon</h2>
      <div id="apiBadge" class="badge">API kalit kutilmoqda</div>
    </div>
    <div class="config-panel">
      <input type="password" id="geminiApiKey" placeholder="Gemini API Kalitni kiriting" style="width: 200px;">
      <select id="langSelect">
        <option value="en-US">Ingliz tili (ko'rsatilgan)</option>
        <option value="ru-RU">Rus tili</option>
        <option value="ko-KR">Koreys tili</option>
        <option value="uz-UZ">O'zbek tili</option>
      </select>
      <button id="toggleBtn" class="btn-primary">Tinglashni boshlash</button>
    </div>
  </header>

  <div class="workspace">
    <div class="pane">
      <h2>Asl matn</h2>
      <div class="content-area" id="originalPane">
        <div class="empty-hint" id="originalHint">Ma'ruzachi gapira boshlaganda matn shu yerda chiqadi...</div>
      </div>
    </div>
    <div class="pane">
      <h2>O'zbekcha tarjima</h2>
      <div class="content-area" id="translatedPane">
        <div class="empty-hint" id="translatedHint">Tarjima...</div>
      </div>
    </div>
  </div>

  <div class="controls-bottom">
    <button id="clearBtn">Tozalash</button>
    <button id="copyBtn">Matnni nusxalash</button>
    <button id="downloadBtn">Konspekt yuklash (.txt)</button>
  </div>

  <script>
    const geminiApiKeyInput = document.getElementById('geminiApiKey');
    const apiBadge = document.getElementById('apiBadge');
    const langSelect = document.getElementById('langSelect');
    const toggleBtn = document.getElementById('toggleBtn');
    const originalPane = document.getElementById('originalPane');
    const translatedPane = document.getElementById('translatedPane');
    const originalHint = document.getElementById('originalHint');
    const translatedHint = document.getElementById('translatedHint');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    let recognition = null;
    let listening = false;
    let translationQueue = [];
    let isProcessingQueue = false;
    let fullLog = [];

    function setApiBadge(text, status = '') {
      apiBadge.textContent = text;
      apiBadge.className = 'badge';
      if(status === 'on') apiBadge.classList.add('on');
      if(status === 'err') apiBadge.classList.add('err');
    }

    function timeNow() {
      return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
    }

    function removeHints() {
      if(document.getElementById('originalHint')) document.getElementById('originalHint').remove();
      if(document.getElementById('translatedHint')) document.getElementById('translatedHint').remove();
    }

    function buildRecognition() {
      const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!Speech) {
        alert("Brauzeringiz nutqni tanishni qo'llab-quvvatlamaydi. Chrome yoki Safari ishlating.");
        return null;
      }
      const rec = new Speech();
      rec.continuous = true;
      rec.interimResults = true;
      rec.lang = langSelect.value;

      rec.onresult = (event) => {
        removeHints();
        clearInterim();
        
        let interimTranscript = '';
        let finalTranscript = '';

        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }

        if(finalTranscript.trim()) {
          appendOriginalFinal(finalTranscript.trim());
        }
        if(interimTranscript.trim()) {
          showInterim(interimTranscript.trim());
        }
      };

      rec.onerror = (e) => { console.error("Speech error", e); };
      rec.onend = () => { if(listening) { try { rec.start(); } catch(err){} } };
      return rec;
    }

    function clearInterim() {
      const existing = document.getElementById('interimBox');
      if(existing) existing.remove();
    }

    function showInterim(text) {
      clearInterim();
      const box = document.createElement('div');
      box.id = 'interimBox';
      box.className = 'msg-box interim';
      box.textContent = text;
      originalPane.appendChild(box);
      originalPane.scrollTop = originalPane.scrollHeight;
    }

    function appendOriginalFinal(text) {
      const id = 'msg-' + Math.random().toString(36).substr(2, 9);
      const timeStr = timeNow();

      const origBox = document.createElement('div');
      origBox.className = 'msg-box';
      origBox.innerHTML = `<span class="time">${timeStr}</span><p>${text}</p>`;
      originalPane.appendChild(origBox);
      originalPane.scrollTop = originalPane.scrollHeight;

      const transBox = document.createElement('div');
      transBox.id = id;
      transBox.className = 'msg-box pending';
      transBox.innerHTML = `<span class="time">${timeStr}</span><p>tarjima kutilmoqda...</p>`;
      translatedPane.appendChild(transBox);
      translatedPane.scrollTop = translatedPane.scrollHeight;

      translationQueue.push({ original: text, pendingId: id });
      processQueue();
    }

    async function processQueue(){
      if(isProcessingQueue) return;
      isProcessingQueue = true;
      while(translationQueue.length > 0){
        const job = translationQueue.shift();
        await translateOne(job.original, job.pendingId);
      }
      isProcessingQueue = false;
    }

    async function translateOne(original, pendingId){
  const apiKey = geminiApiKeyInput.value.trim();
  if(!apiKey) {
    const el = document.getElementById(pendingId);
    if(el) el.querySelector('p').textContent = '(API Kalit kiritilmagan!)';
    setApiBadge('kalit yo\'q', 'err');
    return;
  }

  setApiBadge(translationQueue.length > 0 ? `navbatda (${translationQueue.length}) …` : 'tarjimada…');

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
  const promptText = `Translate this phrase into natural Uzbek. Reply ONLY with the direct translation, no extra notes: "${original}"`;

  const bodyData = {
    contents: [{ parts: [{ text: promptText }] }]
  };

  try{
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(bodyData)
    });
    const data = await response.json();
    
    if (data.error) {
      const el = document.getElementById(pendingId);
      if(el) {
        el.classList.remove('pending');
        el.querySelector('p').textContent = `Google Xatosi: ${data.error.message} (Kod: ${data.error.code})`;
      }
      setApiBadge('Google xatosi', 'err');
      return;
    }

    let translated = '';
    if(data && data.candidates && data.candidates[0].content.parts[0].text){
      translated = data.candidates[0].content.parts[0].text.trim();
    }
    if(!translated){ translated = '(tarjima topilmadi - format xatosi)'; }

    const el = document.getElementById(pendingId);
    if(el){
      el.classList.remove('pending');
      el.querySelector('p').textContent = translated;
    }
    fullLog.push({time: timeNow(), original, translated});
    setApiBadge(translationQueue.length > 0 ? `navbatda (${translationQueue.length}) …` : 'tayyor', 'on');
  } catch(err){
    const el = document.getElementById(pendingId);
    if(el){
      el.classList.remove('pending');
      el.querySelector('p').textContent = `Ulanish xatosi: ${err.message}`;
    }
    setApiBadge('xatolik', 'err');
  }
}

function startListening(){
  recognition = buildRecognition();
  listening = true;
  toggleBtn.classList.add('recording');
  toggleBtn.textContent = 'To\'xtatish';
  try{ recognition.start(); }catch(err){ listening = false; }
}

function stopListening(){
  listening = false;
  toggleBtn.classList.remove('recording');
  toggleBtn.textContent = 'Tinglashni boshlash';
  clearInterim();
  if(recognition){ try{ recognition.stop(); }catch(err){} }
}

toggleBtn.addEventListener('click', () => {
  if(listening){ stopListening(); } else { startListening(); }
});

langSelect.addEventListener('change', () => {
  if(listening){
    listening = false;
    if(recognition){ try{ recognition.stop(); }catch(e){} }
    setTimeout(() => { startListening(); }, 250);
  }
});

clearBtn.addEventListener('click', () => {
  originalPane.innerHTML = '<h2>Asl matn</h2><div class="empty-hint" id="originalHint">Ma\'ruzachi gapira boshlaganda...</div>';
  translatedPane.innerHTML = '<h2>O\'zbekcha tarjima</h2><div class="empty-hint" id="translatedHint">Tarjima...</div>';
  fullLog = []; translationQueue = [];
});

copyBtn.addEventListener('click', () => {
  const text = fullLog.map(e => `[${e.time}]\nAsl: ${e.original}\nTarjima: ${e.translated}\n`).join('\n');
  navigator.clipboard.writeText(text || 'Bo\'sh').then(() => {
    copyBtn.textContent = 'Nusxalandi ✓';
    setTimeout(() => copyBtn.textContent = 'Matnni nusxalash', 1500);
  });
});

downloadBtn.addEventListener('click', () => {
  const text = fullLog.map(e => `[${e.time}]\nAsl: ${e.original}\nTarjima: ${e.translated}\n`).join('\n');
  const blob = new Blob([text || 'Bo\'sh.'], {type: 'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `konspekt-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
});
    geminiApiKeyInput.value = "AQ.Ab8RN6IALWseyaYg5-6evfNDUH_3x-WOT0B6Ac7v0Md72b0UwQ"; setApiBadge('tayyor', 'on');
</script>
</body>
</html>
